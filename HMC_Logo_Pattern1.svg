    <rect x="60" y="50" width="150" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- O -->
  <g transform="translate(0, 180)">
    <circle cx="300" cy="130" r="80" fill="none" stroke="black" stroke-width="50"/>
    <circle cx="300" cy="130" r="80" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- R -->
  <g transform="translate(0, 180)">
    <path d="M 420 50 L 420 210 L 530 210 C 570 210 590 190 590 160 C 590 140 575 125 560 120 L 590 50 L 540 50 L 515 115 L 470 115 L 470 50 Z M 470 155 L 530 155 C 545 155 555 145 555 130 C 555 115 545 105 530 105 L 470 105 Z"
          fill="black"/>
    <rect x="420" y="50" width="170" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- N -->
  <g transform="translate(0, 180)">
    <path d="M 620 50 L 620 210 L 670 210 L 720 100 L 720 210 L 770 210 L 770 50 L 720 50 L 670 160 L 670 50 Z"
          fill="black"/>
    <rect x="620" y="50" width="150" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- I -->
  <g transform="translate(0, 180)">
    <path d="M 800 50 L 800 210 L 850 210 L 850 50 Z"
          fill="black"/>
