<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="sunPattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="10" cy="10" r="2" fill="white"/>
    </pattern>
    <pattern id="morningPattern" patternUnits="userSpaceOnUse" width="30" height="30">
      <path d="M 15 5 L 20 20 L 10 20 Z" fill="white" opacity="0.7"/>
    </pattern>
  </defs>

  <!-- Background for visualization -->
  <rect width="1000" height="400" fill="white"/>

  <!-- Main Text: HEALTHY MORNING CLUB -->
  <!-- Styling: Bold geometric sans-serif with internal pattern -->

  <!-- H -->
  <g>
    <path d="M 60 120 L 60 280 L 110 280 L 110 200 L 160 200 L 160 280 L 210 280 L 210 120 L 160 120 L 160 170 L 110 170 L 110 120 Z"
          fill="black"/>
    <rect x="60" y="120" width="150" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- E -->
  <g>
    <path d="M 240 120 L 240 280 L 360 280 L 360 240 L 290 240 L 290 210 L 350 210 L 350 170 L 290 170 L 290 160 L 360 160 L 360 120 Z"
          fill="black"/>
    <rect x="240" y="120" width="120" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- A -->
  <g>
    <path d="M 390 280 L 440 120 L 490 280 L 540 280 L 465 120 L 415 120 L 340 280 Z M 410 200 L 515 200 L 465 150 Z"
          fill="black"/>
    <rect x="390" y="120" width="150" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- L -->
  <g>
    <path d="M 570 120 L 570 280 L 700 280 L 700 240 L 620 240 L 620 120 Z"
          fill="black"/>
