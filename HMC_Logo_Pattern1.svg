  </g>

  <!-- N -->
  <g transform="translate(0, 180)">
    <path d="M 880 50 L 880 210 L 930 210 L 980 100 L 980 210 L 1030 210 L 1030 50 L 980 50 L 930 160 L 930 50 Z"
          fill="black"/>
    <rect x="880" y="50" width="150" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- G -->
  <g transform="translate(0, 180)">
    <path d="M 1070 50 L 1070 210 L 1200 210 L 1200 160 L 1120 160 L 1120 130 L 1190 130 L 1190 90 L 1120 90 L 1120 50 Z"
          fill="black"/>
    <rect x="1070" y="50" width="130" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- Subtext -->
  <text x="500" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#666">
