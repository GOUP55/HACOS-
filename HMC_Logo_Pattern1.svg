  </g>

  <!-- H -->
  <g>
    <path d="M 920 120 L 920 280 L 970 280 L 970 200 L 1020 200 L 1020 280 L 1070 280 L 1070 120 L 1020 120 L 1020 170 L 970 170 L 970 120 Z"
          fill="black"/>
    <rect x="920" y="120" width="150" height="160" fill="url(#sunPattern)" opacity="0.4"/>
  </g>

  <!-- Second row: MORNING CLUB -->
  <!-- M -->
  <g transform="translate(0, 180)">
    <path d="M 60 50 L 60 210 L 110 210 L 135 120 L 160 210 L 210 210 L 210 50 L 160 50 L 160 140 L 135 70 L 110 140 L 110 50 Z"
