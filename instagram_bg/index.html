<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMC Instagram Posts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            padding: 20px 12px 40px;
            font-family: -apple-system, sans-serif;
        }
        h1 {
            color: #C8A96E;
            font-size: 1em;
            letter-spacing: 6px;
            text-align: center;
            padding: 16px 0 24px;
            font-weight: 400;
        }
        .grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 540px;
            margin: 0 auto;
        }
        .card {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
        }
        .card img {
            width: 100%;
            display: block;
        }
        .label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #aaa;
            font-size: 0.7em;
            letter-spacing: 2px;
            padding: 24px 12px 10px;
            text-align: right;
        }
        a.dl {
            display: block;
            text-align: center;
            margin-top: 8px;
            color: #555;
            font-size: 0.72em;
            letter-spacing: 1px;
            text-decoration: none;
            padding: 6px;
        }
    </style>
</head>
<body>
    <h1>H M C · INSTAGRAM</h1>
    <div class="grid">
        <div class="card">
            <img src="post01_morning_rise.png">
            <div class="label">01 · MORNING RISE</div>
        </div>
        <a class="dl" href="post01_morning_rise.png" download>↓ 保存</a>

        <div class="card">
            <img src="post02_sanctuary.png">
            <div class="label">02 · SANCTUARY</div>
        </div>
        <a class="dl" href="post02_sanctuary.png" download>↓ 保存</a>

        <div class="card">
            <img src="post03_cream_frame.png">
            <div class="label">03 · CREAM FRAME</div>
        </div>
        <a class="dl" href="post03_cream_frame.png" download>↓ 保存</a>

        <div class="card">
            <img src="post04_sauna_steam.png">
            <div class="label">04 · SAUNA STEAM</div>
        </div>
        <a class="dl" href="post04_sauna_steam.png" download>↓ 保存</a>

        <div class="card">
            <img src="post05_grid_premium.png">
            <div class="label">05 · GRID PREMIUM</div>
        </div>
        <a class="dl" href="post05_grid_premium.png" download>↓ 保存</a>

        <div class="card">
            <img src="post06_amber_horizon.png">
            <div class="label">06 · AMBER HORIZON</div>
        </div>
        <a class="dl" href="post06_amber_horizon.png" download>↓ 保存</a>
    </div>
</body>
</html>
