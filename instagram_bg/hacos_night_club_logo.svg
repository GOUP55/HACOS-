<svg viewBox="0 0 630 630" width="630" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Night sky gradient background -->
    <radialGradient id="bgGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1A1F3A"/>
      <stop offset="100%" stop-color="#0A0C1A"/>
    </radialGradient>
    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F0D080" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8A96E" stop-opacity="0"/>
    </radialGradient>
    <!-- Cup gradient -->
    <linearGradient id="cupGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2040"/>
      <stop offset="100%" stop-color="#1A1530"/>
    </linearGradient>
    <!-- Liquid gradient (moonlit surface) -->
    <linearGradient id="liquidGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D3A5E"/>
      <stop offset="50%" stop-color="#1E2848"/>
      <stop offset="100%" stop-color="#3A2D5E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="630" height="630" fill="#F5F0E8"/>

  <!-- Moon glow halo -->
  <circle cx="315" cy="245" r="160" fill="url(#moonGlow)"/>

  <!-- Moon circle (replacing sun) -->
  <circle cx="315" cy="245" r="118" fill="#1E2448"/>
  <!-- Moon crescent (masking to create crescent effect) -->
  <circle cx="315" cy="245" r="118" fill="#C8A96E" opacity="0.15"/>

  <!-- Stars inside moon circle -->
  <g fill="#F0D080" opacity="0.9">
    <circle cx="270" cy="190" r="2.5"/>
    <circle cx="355" cy="200" r="2"/>
    <circle cx="290" cy="225" r="1.5"/>
    <circle cx="345" cy="230" r="2"/>
    <circle cx="310" cy="175" r="1.8"/>
    <circle cx="375" cy="245" r="1.5"/>
    <circle cx="255" cy="250" r="2"/>
    <circle cx="330" cy="210" r="1.2"/>
    <circle cx="280" cy="270" r="1.5"/>
    <circle cx="360" cy="270" r="1.8"/>
  </g>

  <!-- Crescent moon shape -->
  <path d="M 315 135
           A 110 110 0 1 1 314.9 135
           A 80 80 0 0 0 315 135 Z"
        fill="#C8A96E" opacity="0.0"/>
  <!-- Actual crescent -->
  <circle cx="315" cy="245" r="112" fill="none" stroke="#C8A96E" stroke-width="2" opacity="0.4"/>
  <!-- Crescent mask -->
  <circle cx="350" cy="220" r="92" fill="#1E2448"/>
  <!-- Visible crescent arc -->
  <path d="M 287 148 A 97 97 0 0 1 380 290 A 70 70 0 0 0 287 148 Z" fill="#C8A96E" opacity="0.7"/>

  <!-- Cup shadow/base -->
  <ellipse cx="315" cy="430" rx="110" ry="14" fill="#1A1530" opacity="0.25"/>

  <!-- Cup body -->
  <path d="M 195 340 Q 195 420 230 430 L 400 430 Q 435 420 435 340 Z"
        fill="url(#cupGrad)" stroke="#2A2040" stroke-width="2"/>

  <!-- Cup rim ellipse top -->
  <ellipse cx="315" cy="340" rx="120" ry="22" fill="#2A2040" stroke="#3A3060" stroke-width="1.5"/>

  <!-- Liquid surface (night sky in cup) -->
  <ellipse cx="315" cy="340" rx="114" ry="18" fill="url(#liquidGrad)"/>

  <!-- Liquid surface shimmer -->
  <ellipse cx="315" cy="340" rx="114" ry="18" fill="none" stroke="#C8A96E" stroke-width="0.8" opacity="0.3"/>

  <!-- Wave in cup (moonlit wave) -->
  <path d="M 210 340 Q 240 328 270 336 Q 300 344 330 332 Q 360 320 390 332 Q 410 338 420 340"
        fill="none" stroke="#C8A96E" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M 215 344 Q 248 335 278 340 Q 308 346 340 336 Q 368 328 400 337"
        fill="none" stroke="white" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>

  <!-- Moonlight reflection on liquid -->
  <ellipse cx="290" cy="342" rx="28" ry="7" fill="white" opacity="0.08"/>

  <!-- Steam wisps (cool night steam) -->
  <g stroke="#C8A96E" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M 285 310 Q 278 290 285 272 Q 292 254 285 238"/>
    <path d="M 315 305 Q 308 283 315 263 Q 322 243 315 225"/>
    <path d="M 345 310 Q 338 290 345 272 Q 352 254 345 238"/>
  </g>

  <!-- Cup handle -->
  <path d="M 430 355 Q 475 355 475 385 Q 475 415 430 415"
        fill="none" stroke="url(#cupGrad)" stroke-width="22" stroke-linecap="round"/>
  <path d="M 430 355 Q 468 355 468 385 Q 468 415 430 415"
        fill="none" stroke="#3A3060" stroke-width="8" stroke-linecap="round"/>

  <!-- Base plate -->
  <ellipse cx="315" cy="432" rx="130" ry="12" fill="#2A2040" opacity="0.6"/>
  <ellipse cx="315" cy="432" rx="130" ry="12" fill="none" stroke="#3A3060" stroke-width="1"/>

  <!-- Text: HACOS -->
  <text x="315" y="506"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="54"
        font-weight="bold"
        fill="#1A1530"
        text-anchor="middle"
        letter-spacing="12">HACOS</text>

  <!-- Text: NIGHT CLUB -->
  <text x="315" y="548"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="22"
        fill="#666"
        text-anchor="middle"
        letter-spacing="7"
        font-weight="400">NIGHT CLUB</text>

  <!-- Decorative line under text -->
  <line x1="230" y1="562" x2="280" y2="562" stroke="#C8A96E" stroke-width="1.5" opacity="0.7"/>
  <circle cx="315" cy="562" r="3" fill="#C8A96E" opacity="0.7"/>
  <line x1="350" y1="562" x2="400" y2="562" stroke="#C8A96E" stroke-width="1.5" opacity="0.7"/>
</svg>
