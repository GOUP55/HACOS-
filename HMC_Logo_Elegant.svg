<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="800" fill="white"/>

  <!-- PATTERN 1: BOLD GEOMETRIC STYLE -->
  <!-- Group for Pattern 1 (left side) -->
  <g id="pattern1-group" transform="translate(0, 0)">
    <text x="400" y="220" font-family="Impact, Arial Black, sans-serif" font-size="180" font-weight="900" fill="black" letter-spacing="-5">
      HMC
    </text>

    <!-- Diamond/sun pattern overlay on text -->
    <g opacity="0.4" fill="white">
      <!-- Decorative diamonds -->
      <polygon points="220,100 235,115 220,130 205,115"/>
      <polygon points="280,140 293,153 280,166 267,153"/>
      <polygon points="350,90 363,103 350,116 337,103"/>
      <polygon points="420,150 433,163 420,176 407,163"/>
      <polygon points="500,110 513,123 500,136 487,123"/>
      <polygon points="560,160 573,173 560,186 547,173"/>
    </g>

    <!-- Subtext -->
    <text x="400" y="290" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="black" letter-spacing="3">
      HEALTHY MORNING CLUB
    </text>

    <text x="400" y="340" font-family="Arial, sans-serif" font-size="20" font-weight="400" text-anchor="middle" fill="#888" letter-spacing="4">
      WELLNESS · RECOVERY · RITUAL
    </text>

    <!-- Decorative line -->
    <line x1="250" y1="360" x2="550" y2="360" stroke="black" stroke-width="2"/>
  </g>

  <!-- PATTERN 2: ELEGANT SCRIPT STYLE -->
  <!-- Group for Pattern 2 (right side) -->
  <g id="pattern2-group" transform="translate(750, 80)">
    <!-- Main text in elegant serif/script style -->
    <text x="200" y="180" font-family="Georgia, serif" font-size="140" font-weight="700" font-style="italic" fill="black" letter-spacing="-3">
      HMC
    </text>

    <!-- Decorative underline -->
    <line x1="80" y1="210" x2="320" y2="210" stroke="black" stroke-width="3"/>

    <!-- Subheading -->
    <text x="200" y="280" font-family="Georgia, serif" font-size="32" font-weight="700" text-anchor="middle" fill="black" letter-spacing="2">
      Morning Club
    </text>

    <!-- Small accent text -->
    <text x="200" y="320" font-family="Georgia, serif" font-size="18" font-weight="400" text-anchor="middle" fill="#666" letter-spacing="3">
      HEALTHY · AUTHENTIC · SANCTUARY
    </text>

    <!-- Decorative elements (sunrise motif) -->
    <g transform="translate(80, 100)" opacity="0.5">
      <!-- Rising sun -->
      <circle cx="0" cy="0" r="15" fill="none" stroke="black" stroke-width="2"/>
      <!-- Rays -->
      <line x1="0" y1="-25" x2="0" y2="-35" stroke="black" stroke-width="2"/>
      <line x1="20" y1="-20" x2="28" y2="-28" stroke="black" stroke-width="2"/>
      <line x1="25" y1="0" x2="35" y2="0" stroke="black" stroke-width="2"/>
    </g>
  </g>

  <!-- DIVIDER LINE between patterns -->
  <line x1="700" y1="100" x2="700" y2="700" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Labels -->
  <text x="350" y="750" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#666">
    PATTERN 1: BOLD GEOMETRIC
  </text>

  <text x="1050" y="750" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#666">
    PATTERN 2: ELEGANT SERIF
  </text>
</svg>
